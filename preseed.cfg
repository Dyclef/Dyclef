#--------------------------------------------------------------------#
#--------------------DEBIAN PRESEED CONFIGURATION--------------------#
#--------------------------DREDEB EDITION----------------------------#
#--------------------------------------------------------------------#

# LOCALE
d-i debian-installer/locale string en_US.UTF-8
d-i debian-installer/language string en
d-i debian-installer/country string US
d-i keyboard-configuration/xkb-keymap select us
d-i keyboard-configuration/toggle select No toggling

# NETWORK
d-i netcfg/get_hostname string dreb
d-i netcfg/hostname string dreb
d-i netcfg/choose_interface select auto
d-i netcfg/disable_autoconfig boolean true
d-i netcfg/get_ipaddress string 192.168.88.195
d-i netcfg/get_netmask string 255.255.255.0
d-i netcfg/get_gateway string 192.168.88.1
d-i netcfg/get_nameservers string 192.168.88.1
d-i netcfg/confirm_static boolean true

# MIRROR
d-i mirror/country string manual
d-i mirror/protocol string https
d-i mirror/https/hostname string deb.debian.org
d-i mirror/https/directory string /debian
d-i mirror/suite string testing
d-i mirror/https/proxy string

# ACCOUNTS
d-i passwd/root-login boolean false
d-i passwd/user-fullname string dev
d-i passwd/username string dev
d-i passwd/user-password password temppass
d-i passwd/user-password-again password temppass
d-i passwd/user-default-groups string sudo

# NTP
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true
d-i clock-setup/ntp-server string pool.ntp.org

