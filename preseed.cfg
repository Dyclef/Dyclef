#--------------------------------------------------------------------#
#----------------------------LATE COMMAND----------------------------#
#--------------------------------------------------------------------#

d-i preseed/late_command string \
    \
    # ============================================================ \
    # USER GROUPS FOR WAYLAND \
    # ============================================================ \
    in-target usermod -aG video,render,input,audio dev ; \
    in-target groupadd -f seat ; \
    in-target usermod -aG seat dev ; \
    \
    # ============================================================ \
    # ENABLE CORE SERVICES \
    # ============================================================ \
    in-target systemctl enable seatd.service ; \
    in-target systemctl enable netfilter-persistent.service ; \
    \
    # ============================================================ \
    # BOOTSTRAP FIREWALL \
    # ============================================================ \
    cat > /target/usr/local/bin/firewall-bootstrap.sh << 'FWEOF'
#!/bin/bash
iptables -F
iptables -X
iptables -Z
iptables -t nat -F
iptables -t nat -X
iptables -t mangle -F
iptables -t mangle -X
iptables -P INPUT DROP
iptables -P FORWARD DROP
iptables -P OUTPUT ACCEPT
iptables -A INPUT -i lo -j ACCEPT
iptables -A INPUT -m conntrack --ctstate INVALID -j DROP
iptables -A INPUT -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT
iptables -A INPUT -j DROP
ip6tables -F
ip6tables -X
ip6tables -Z
ip6tables -P INPUT DROP
ip6tables -P FORWARD DROP
ip6tables -P OUTPUT DROP
mkdir -p /etc/iptables
iptables-save > /etc/iptables/rules.v4
ip6tables-save > /etc/iptables/rules.v6
FWEOF
    chmod 700 /target/usr/local/bin/firewall-bootstrap.sh ; \
    \
    cat > /target/etc/systemd/system/firewall-bootstrap.service << 'FWSVC'
[Unit]
Description=Bootstrap Firewall
DefaultDependencies=no
Before=network-pre.target
Wants=network-pre.target

[Service]
Type=oneshot
ExecStart=/usr/local/bin/firewall-bootstrap.sh
RemainAfterExit=yes

[Install]
WantedBy=multi-user.target
FWSVC
    in-target systemctl enable firewall-bootstrap.service ; \
    \
    # ============================================================ \
    # STAGE HARDENING SCRIPT LOCATION \
    # ============================================================ \
    mkdir -p /target/root/dredeb ; \
    \
    # ============================================================ \
    # FIRST-BOOT HARDENING SERVICE \
    # ============================================================ \
    cat > /target/etc/systemd/system/dredeb-harden.service << 'HARDSVC'
[Unit]
Description=Dredeb First Boot Hardening
After=local-fs.target
Before=display-manager.service
ConditionPathExists=/root/dredeb/harden.sh

[Service]
Type=oneshot
ExecStart=/bin/bash /root/dredeb/harden.sh
ExecStartPost=/bin/rm -f /etc/systemd/system/dredeb-harden.service
ExecStartPost=/bin/systemctl daemon-reload
RemainAfterExit=yes
StandardOutput=journal+console
StandardError=journal+console

[Install]
WantedBy=multi-user.target
HARDSVC
    in-target systemctl enable dredeb-harden.service